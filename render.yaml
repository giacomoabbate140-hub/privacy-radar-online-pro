services:
  - type: web
    name: privacy-radar-online-pro
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ONLINE_PRO_TOKEN
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: SAFE_BROWSING_API_KEY
        sync: false
